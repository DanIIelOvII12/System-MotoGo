<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MOTOGO - Iniciar Sesión</title>
  <link rel="stylesheet" href="estilo.css"/>
</head>
<body>
  <div class="centered-card">
    <div class="text-center mb-12">
      <div class="logo">MOTO<span class="accent">GO</span></div>
    </div>

    <div class="text-center mb-8">
      <h1 class="h1">INICIAR SESIÓN</h1>
      <p class="subtitle">Ingresa a tu cuenta para continuar</p>
    </div>

    <form id="login-form" class="form mt-12">
      <div>
        <label class="label">Correo electrónico</label>
        <input id="login-correo" class="input" type="email" placeholder="tu@email.com"/>
      </div>

      <div>
        <label class="label">Contraseña</label>
        <input id="login-password" class="input" type="password" placeholder="••••••••"/>
      </div>

      <div class="row justify-between items-center">
        <label class="check-row"><input class="checkbox" type="checkbox"/> Recordarme</label>
        <a class="link" href="#">¿Olvidaste tu contraseña?</a>
      </div>

      <a class="btn" href="cliente.html" style="display:block; text-align:center; background:#dc2626; color:#fff; padding:14px; border-radius:8px;">Iniciar Sesión</a>
    </form>

    <div class="mt-12 text-center">
      <a class="link" href="registro.html">Registrarse</a>
    </div>
  </div>

  <script src="crud.js"></script>
</body>
</html>
