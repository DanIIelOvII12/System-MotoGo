<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MOTOGO - Mi Carrito</title>
  <link rel="stylesheet" href="estilo.css"/>
</head>
<body>
  <main class="container">
    <div class="centered-card">
      <div class="text-center mb-16">
        <div class="logo">MOTO<span class="accent">GO</span></div>
      </div>

      <div class="text-center mb-8">
        <h1 class="h1">MI CARRITO</h1>
        <p class="subtitle">Gestiona tus repuestos antes de comprar</p>
      </div>

      <div class="card mt-12">
        <div class="cart-item">
          <div class="col">
            <div style="font-weight:700; font-size:14px;">KIT PASTILLAS DE FRENO DELANTERAS - ORIGINAL</div>
            <div class="text-red mt-8">$89.900 COP</div>
          </div>

          <div class="qty-controls">
            <button class="btn-qty" type="button">-</button>
            <div class="small">1</div>
            <button class="btn-qty" type="button">+</button>
            <button class="btn-ghost" type="button">X</button>
          </div>
        </div>

        <div class="row justify-between mt-16">
          <div class="small">Total a Pagar:</div>
          <div class="h1 text-red">$89.900 COP</div>
        </div>

        <div class="mt-16">
          <a class="btn" href="confirmardireccion.html" style="background:#dc2626;color:#fff;width:100%;">Comprar Ahora</a>
        </div>

        <div class="mt-12 text-center">
          <a class="link" href="cliente.html">← Seguir buscando repuestos</a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
