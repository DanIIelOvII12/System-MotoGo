<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MOTOGO - Confirmar Pedido</title>
  <link rel="stylesheet" href="estilo.css"/>
</head>
<body>
  <div class="container mt-24">
    <h1 class="h1">Finalizar Compra</h1>

    <div class="mt-16 steps">
      <div class="step completed">✓</div>
      <div class="step-line" style="background:#dc2626;"></div>
      <div class="step completed">✓</div>
      <div class="step-line" style="background:#dc2626;"></div>
      <div class="step active">3</div>
    </div>

    <div class="checkout">
      <div>
        <div class="card">
          <h3 class="h2">Confirmar Pedido</h3>
          <div class="mt-12">
            <h4 class="small">Dirección de Entrega</h4>
            <div class="small">Carrera 7 #32-16, Bogotá</div>
          </div>
          <div class="mt-12">
            <h4 class="small">Método de Pago</h4>
            <div class="small">Card</div>
          </div>
          <div class="mt-12">
            <h4 class="small">Productos (1)</h4>
            <div class="row justify-between">
              <div class="small">Llanta Trasera Pirelli MT60 140/70-17 x1</div>
              <div class="small">$ 345.000</div>
            </div>
          </div>

          <div class="mt-16 row">
            <a class="btn btn-ghost" href="pago.html" style="flex:1;">Volver</a>
            <a class="btn" href="cliente.html" style="flex:1; background:#dc2626; color:#fff;">Confirmar y Pagar</a>
          </div>
        </div>
      </div>

      <aside>
        <div class="summary">
          <h3 class="h2">Resumen</h3>
          <div class="row justify-between"><div class="small">Subtotal</div><div>$ 345.000</div></div>
          <div class="row justify-between"><div class="small">Envío</div><div class="text-green">GRATIS</div></div>
          <div style="height:1px;background:#f3f4f6;margin:8px 0;"></div>
          <div class="row justify-between"><div class="h2">Total</div><div class="price text-red">$ 345.000</div></div>
          <div class="mt-12" style="background:#f0fdf4;border:1px solid #bbf7d0;padding:10px;border-radius:6px;color:#166534;">
            ✓ Entrega estimada: Mañana
          </div>
        </div>
      </aside>
    </div>
  </div>
</body>
</html>
